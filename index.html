<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="All-in-One AI Tools Hub - Free AI Tools">
    <title>AI Tools Hub</title>
    <!-- Font Awesome CDN - GitHub App में काम करेगा -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Mobile-first CSS - GitHub App के लिए optimized */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            padding: 16px;
        }
        
        /* Dark mode support */
        body.dark {
            background: #0a0a0a;
            color: white;
        }
        
        /* Mobile responsive container */
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Cards grid - mobile first */
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin: 20px 0;
        }
        
        /* Tablet and up */
        @media (min-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .tools-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        body.dark .tool-card {
            background: #1a1a1a;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            width: 100%;
            font-size: 16px;
        }
        
        /* GitHub App में smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Touch-friendly buttons */
        button, .tool-card {
            min-height: 44px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Tools Hub</h1>
        <p>Free AI tools - Text, Image, Code & more!</p>
        
        <button onclick="toggleTheme()" class="btn-primary" style="margin: 10px 0;">
            🌓 Dark/Light Mode
        </button>
        
        <div class="tools-grid" id="toolsGrid">
            <!-- Tools will load here -->
        </div>
    </div>

    <script>
        const tools = [
            { name: "✍️ AI Text Generator", desc: "Blog, stories, captions" },
            { name: "🎨 AI Image Generator", desc: "Generate images" },
            { name: "💻 AI Code Generator", desc: "Write code" },
            { name: "🤖 AI Chatbot", desc: "Answer questions" },
            { name: "📹 YouTube Script", desc: "Video scripts" },
            { name: "📄 Resume Builder", desc: "Professional resume" },
            { name: "📖 Story Generator", desc: "Kids & emotional stories" },
            { name: "🎤 Voice Generator", desc: "Text to speech" }
        ];
        
        // Load tools in GitHub App
        function loadTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <div class="tool-card" onclick="alert('${tool.name}: Demo version. Full AI integration coming soon!')">
                    <h3>${tool.name}</h3>
                    <p>${tool.desc}</p>
                </div>
            `).join('');
        }
        
        // Theme toggle for GitHub App
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Load saved theme
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
        
        // Initialize
        loadTools();
        
        // Fix for GitHub App - ensure touch events work
        document.querySelectorAll('.tool-card').forEach(card => {
            card.addEventListener('touchstart', function(e) {
                this.style.transform = 'scale(0.98)';
            });
            card.addEventListener('touchend', function(e) {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
